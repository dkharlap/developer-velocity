<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mountainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#cbd5e1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#64748b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle with sky gradient -->
  <circle cx="16" cy="16" r="15" fill="url(#skyGrad)"/>
  
  <!-- Left mountain -->
  <path d="M 3 26 L 11 16 L 19 26 Z" 
        fill="#475569" 
        opacity="0.8"/>
  
  <!-- Right mountain -->
  <path d="M 13 26 L 21 17 L 29 26 Z" 
        fill="#334155" 
        opacity="0.8"/>
  
  <!-- Main mountain peak (center, tallest) -->
  <path d="M 16 9 L 25 26 L 7 26 Z" 
        fill="url(#mountainGrad)" 
        stroke="#1e293b" 
        stroke-width="0.3"/>
  
  <!-- Snow cap on main peak -->
  <path d="M 16 9 L 19.5 15 L 12.5 15 Z" 
        fill="#ffffff" 
        opacity="0.95"/>
  
  <!-- Ground/horizon line -->
  <rect x="0" y="26" width="32" height="6" fill="#1e293b" opacity="0.3"/>
</svg>
